global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "riyura-backend"
    metrics_path: "/actuator/prometheus"
    scrape_interval: 5s
    static_configs:
      # In docker-compose, this relies on docker host routing or standard local networking.
      # If Prometheus runs in docker but Spring Boot is on host, use host.docker.internal
      - targets: ["host.docker.internal:8080"]

  - job_name: "redis-exporter"
    scrape_interval: 10s
    static_configs:
      - targets: ["redis-exporter:9121"]
