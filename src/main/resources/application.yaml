spring:
  application:
    name: Riyura

  # Virtual threads: every Tomcat request handler and @Async task runs on a
  # JDK 21 virtual thread instead of a bounded platform-thread pool.
  threads:
    virtual:
      enabled: true

  # Redis Configuration (Watch Party ephemeral state)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # Supabase DataSource Configuration
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    # HikariCP Settings
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 5000

  # JPA Settings
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# TMDB Configuration
tmdb:
  api-key: ${TMDB_API_KEY}
  base-url: ${TMDB_BASE_URL:${TMDB_API_BASE_URL}}
  image-base-url: ${TMDB_IMAGE_BASE_URL}

# Supabase Security Configuration
supabase:
  jwt-secret: ${SUPABASE_JWT_SECRET}

# Application security configuration
riyura:
  security:
    encryption-key: ${ENCRYPTION_KEY}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    groups-order: ASC
    operations-sorter: method
    tags-sorter: alpha
    disable-swagger-default-url: true
  group-configs:
    - group: all
      paths-to-match:
        - /api/**
    - group: explore
      paths-to-match:
        - /api/explore/**
    - group: watchlist
      paths-to-match:
        - /api/watchlist/**
    - group: profile
      paths-to-match:
        - /api/profile/**
    - group: key
      paths-to-match:
        - /api/key/**
    - group: banner
      paths-to-match:
        - /api/banner/**
    - group: movies
      paths-to-match:
        - /api/movies/**
    - group: tv
      paths-to-match:
        - /api/tv/**
    - group: anime
      paths-to-match:
        - /api/anime/**
    - group: party
      paths-to-match:
        - /api/party/**
    - group: testing
      paths-to-match:
        - /api/test/**
        - /api/test/health

# Application Configuration
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

server:
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024
  tomcat:
    max-connections: 50000
    accept-count: 2000
    connection-timeout: 60000
